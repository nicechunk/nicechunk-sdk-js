<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Transaction builder flow</title>
  <desc id="desc">A sequence diagram showing how applications pass typed inputs to SDK helpers, receive transaction instructions, and own signing and confirmation policy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080d13"/><stop offset="1" stop-color="#15120d"/></linearGradient>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.lane{stroke:rgba(143,220,255,.32);stroke-width:2;stroke-dasharray:8 8}.box{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="label">SDK TRANSACTION FLOW</text>
  <text x="70" y="132" class="title">Typed helpers return instructions, not policy.</text>
  <text x="70" y="168" class="copy">Applications own wallet UX and confirmation. The SDK owns deterministic seeds, account metas, and instruction payload bytes.</text>
  <line class="lane" x1="190" y1="246" x2="190" y2="610"/><line class="lane" x1="500" y1="246" x2="500" y2="610"/><line class="lane" x1="812" y1="246" x2="812" y2="610"/><line class="lane" x1="1090" y1="246" x2="1090" y2="610"/>
  <text x="132" y="232" class="head">Application</text><text x="454" y="232" class="head">SDK</text><text x="746" y="232" class="head">Transaction</text><text x="1036" y="232" class="head">RPC</text>
  <rect class="box" x="98" y="278" width="220" height="72"/><text x="120" y="307" class="small">typed command</text><text x="120" y="332" class="mono">owner, coords, item</text>
  <path d="M318 314 H410" stroke="#8fdcff" stroke-width="3"/><rect class="box" x="410" y="278" width="220" height="72"/><text x="432" y="307" class="small">derive PDAs</text><text x="432" y="332" class="mono">seed order fixed</text>
  <path d="M630 314 H722" stroke="#8fdcff" stroke-width="3"/><rect class="box" x="722" y="278" width="220" height="72"/><text x="744" y="307" class="small">Instruction</text><text x="744" y="332" class="mono">keys + data</text>
  <rect class="box" x="410" y="410" width="220" height="86"/><text x="432" y="441" class="small">decode account</text><text x="432" y="466" class="mono">magic + offset check</text>
  <path d="M812 350 V410 H630" stroke="#8fdcff" stroke-width="3" fill="none"/>
  <rect class="box" x="986" y="410" width="208" height="86"/><text x="1008" y="441" class="small">send / confirm</text><text x="1008" y="466" class="mono">caller owned</text>
  <path d="M942 314 H1090 V410" stroke="#8fdcff" stroke-width="3" fill="none"/>
  <text x="306" y="590" class="copy">SDK tests stay focused on byte correctness; applications choose connection policy.</text>
</svg>
